<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate FPS Survival</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

#hud { position:absolute; top:10px; left:10px; color:white; }

#menu, #gameover {
  position:absolute; top:40%; width:100%; text-align:center; color:white;
}

button { padding:10px 20px; font-size:18px; }

#crosshair {
  position:absolute; top:50%; left:50%;
  width:6px; height:6px; background:white;
  transform:translate(-50%,-50%);
}

#hitmarker {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:20px;
  display:none;
}

#killfeed {
  position:absolute;
  top:10px; right:10px;
  color:white;
}

#damage {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:red;
  opacity:0;
  pointer-events:none;
}

#minimap {
  position:absolute;
  bottom:10px; right:10px;
  background:#111;
}

#staminaContainer {
  position:absolute;
  bottom:10px; left:10px;
  width:200px; height:10px;
  background:#333;
}

#staminaBar {
  height:100%;
  width:100%;
  background:lime;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Ultimate FPS Survival</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="gameover" style="display:none;">
  <h1>Game Over</h1>
  <button onclick="location.reload()">Restart</button>
</div>

<div id="hud" style="display:none;">
Health: <span id="health">100</span><br>
Ammo: <span id="ammo">30</span><br>
Weapon: <span id="weapon">AR</span><br>
Wave: <span id="wave">1</span><br>
Score: <span id="score">0</span>
</div>

<div id="crosshair"></div>
<div id="hitmarker">✖</div>
<div id="killfeed"></div>
<div id="damage"></div>

<canvas id="minimap" width="150" height="150"></canvas>

<div id="staminaContainer">
  <div id="staminaBar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script type="module" src="main.js"></script>

</body>
</html>
